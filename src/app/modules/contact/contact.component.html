<section class="page-container">
  <h2>Contáctame</h2>
  <div class="contact-card" *ngIf="!sent">
    <p>¿Tienes una oportunidad laboral, una idea para un proyecto o simplemente quieres saludar? ¡Escríbeme!</p>
    <form (ngSubmit)="sendMessage()" #contactForm="ngForm">
      <div class="form-group">
        <label for="name">Nombre</label>
        <input type="text" id="name" [(ngModel)]="name" name="name" required placeholder="Tu nombre">
      </div>
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" [(ngModel)]="email" name="email" required placeholder="tu@email.com">
      </div>
      <div class="form-group">
        <label for="message">Mensaje</label>
        <textarea id="message" [(ngModel)]="message" name="message" required rows="5" placeholder="Tu mensaje..."></textarea>
      </div>
      <p *ngIf="error" class="error" role="alert">{{ error }}</p>
      <button type="submit" class="btn" [disabled]="sending">
        {{ sending ? 'Enviando...' : 'Enviar mensaje' }}
      </button>
    </form>
  </div>
  <div class="contact-card success" *ngIf="sent">
    <p>¡Mensaje enviado! ✅</p>
    <p>Gracias por contactarme. Te responderé pronto.</p>
    <button class="btn" (click)="sent = false">Enviar otro mensaje</button>
  </div>
</section>
