<section class="page-container">
  <h2>Mis Proyectos</h2>
  <div class="grid" *ngIf="loading">
    <div class="card skeleton-card" *ngFor="let i of [1,2,3]">
      <app-skeleton width="60%" height="24px"></app-skeleton>
      <app-skeleton width="100%" height="16px"></app-skeleton>
      <app-skeleton width="100%" height="16px"></app-skeleton>
      <app-skeleton width="40%" height="14px"></app-skeleton>
    </div>
  </div>
  <div class="grid" *ngIf="!loading">
    <div class="card" *ngFor="let project of projects">
      <h3>{{project.title}}</h3>
      <p>{{project.description}}</p>
      <a [href]="project.link" target="_blank" class="link">Ver código &rarr;</a>
    </div>
  </div>
</section>
